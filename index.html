  <script>
    // Aggressive Cache & Service Worker Pulse
    (function() {
      const VERSION = '1.0.3';
      if (localStorage.getItem('axis_version') !== VERSION) {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let registration of registrations) { registration.unregister(); }
          });
        }
        caches.keys().then(names => {
          for (let name of names) caches.delete(name);
        });
        localStorage.setItem('axis_version', VERSION);
        console.log('PWA: Force Refresh for Version ' + VERSION);
        window.location.reload(true);
      }
    })();
  </script>

<body>
  <div id="root">
    <style>
      body { margin: 0; background-color: #0c0c0c; }
      .initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background-color: #0c0c0c;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
      }
      .loader-spinner {
        width: 32px;
        height: 32px;
        border: 2px solid rgba(255,255,255,0.1);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s ease-in-out infinite;
        margin-top: 1.5rem;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <div class="initial-loader">
      <img src="/axis-logo.svg" alt="AXIS HAIR" width="100" height="auto" style="opacity: 0.9;" />
      <div class="loader-spinner"></div>
    </div>
  </div>
  <script>
    setTimeout(() => {
      const loader = document.querySelector('.initial-loader');
      if (loader) {
        const msg = document.createElement('div');
        msg.style.cssText = "display:flex;flex-direction:column;align-items:center;margin-top:20px;";
        msg.innerHTML = '<p style="opacity:0.6;font-size:14px;margin-bottom:10px;">Connection slow?</p>' + 
          '<button onclick="window.location.reload()" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:8px 16px;border-radius:4px;cursor:pointer;font-size:13px;">Reload App</button>';
        loader.appendChild(msg);
      }
    }, 8000);
  </script>
</body>
